services:
  contract-deployer:
    image: ghcr.io/pimlicolabs/mock-contract-deployer:main
    environment:
      - ANVIL_RPC=http://anvil:8545
    extra_hosts:
      - 'anvil:host-gateway'

  alto:
    image: ghcr.io/pimlicolabs/alto:latest
    ports:
      - '4337:4337'
    entrypoint: ['node', 'src/lib/cli/alto.js', 'run', '--config', '/app/alto-config.json']
    volumes:
      - ./alto-config.json:/app/alto-config.json
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
    extra_hosts:
      - 'anvil:host-gateway'

  mock-paymaster:
    image: ghcr.io/pimlicolabs/mock-verifying-paymaster:main
    # Host 3002: container still listens on 3000 — avoids clashing with orbitdb-relay-pinner on host :3000
    ports:
      - '3002:3000'
    environment:
      - ALTO_RPC=http://alto:4337
      - ANVIL_RPC=http://anvil:8545
    depends_on:
      contract-deployer:
        condition: service_completed_successfully
      alto:
        condition: service_started
    extra_hosts:
      - 'anvil:host-gateway'
