name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@11.10.1
          npm --version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev

      - name: Install dependencies
        run: npm install --no-audit

      # Relay is `orbitdb-relay-pinner` from package.json (no `relay/` subfolder).
      - name: Rebuild native modules if needed (libp2p / datachannel)
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            npm rebuild @ipshipyard/node-datachannel || true
          else
            echo "node-datachannel native module present"
          fi

      - name: Lint code
        run: npm run lint
        # continue-on-error: true
      - name: Build application
        run: npm run build
      - name: Build success notification
        run: echo "✅ Build completed successfully"

      # Docker compose checks
      - name: Docker Compose - app + relay (orbitdb-relay-pinner image)
        run: |
          docker compose up --build -d
          sleep 20
          docker compose ps
          docker compose down
