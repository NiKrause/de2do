# Full-stack EIP-7702 / passkey escrow E2E: Anvil + docker-compose (Alto) + forge + relay + static preview.
# Mirrors local flow: setup:local-aa:test → build:test → preview:test → playwright (reuse preview, skip duplicate AA/build in globalSetup).
name: E2E Passkey Escrow (local AA)

on:
  workflow_dispatch:
  push:
    branches: [main, eip-7702]
    paths:
      - '.github/workflows/e2e-passkey-escrow.yml'
      - 'e2e/passkey-wallet-escrow.spec.js'
      - 'e2e/global-setup-passkey-escrow.mjs'
      - 'e2e/global-teardown-passkey-escrow.mjs'
      - 'e2e/start-passkey-escrow-relay.mjs'
      - 'playwright.passkey-escrow.config.js'
      - 'scripts/setup-local-aa.mjs'
      - 'contracts/**'
      - 'foundry.toml'
      - 'docker-compose.aa-local.yml'
      - 'alto-config.json'
      - 'src/lib/wallet/**'
      - 'src/lib/escrow/**'
      - 'src/lib/chain/**'
      - '.env.test.example'
  pull_request:
    paths:
      - '.github/workflows/e2e-passkey-escrow.yml'
      - 'e2e/passkey-wallet-escrow.spec.js'
      - 'e2e/global-setup-passkey-escrow.mjs'
      - 'e2e/global-teardown-passkey-escrow.mjs'
      - 'e2e/start-passkey-escrow-relay.mjs'
      - 'playwright.passkey-escrow.config.js'
      - 'scripts/setup-local-aa.mjs'
      - 'contracts/**'
      - 'foundry.toml'
      - 'docker-compose.aa-local.yml'
      - 'alto-config.json'
      - 'src/lib/wallet/**'
      - 'src/lib/escrow/**'
      - 'src/lib/chain/**'
      - '.env.test.example'

concurrency:
  group: e2e-passkey-escrow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  passkey-escrow-full-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout (with forge-std submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 cmake pkg-config libssl-dev curl

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure native node-datachannel is built
        run: |
          if [ ! -f node_modules/@ipshipyard/node-datachannel/build/Release/node_datachannel.node ]; then
            echo "node-datachannel native module missing; rebuilding..."
            rm -rf node_modules/@ipshipyard/node-datachannel/build || true
            pnpm rebuild @ipshipyard/node-datachannel
          else
            echo "node-datachannel native module present"
          fi

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Prepare .env.test
        run: |
          if [ ! -f .env.test ]; then
            cp .env.test.example .env.test
            echo "Created .env.test from .env.test.example"
          fi

      - name: Local AA stack (Anvil + Docker Alto + forge → .env.test)
        run: pnpm run setup:local-aa:test
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Dump AA stack diagnostics
        if: always()
        run: |
          docker compose -f docker-compose.aa-local.yml ps || true
          docker compose -f docker-compose.aa-local.yml logs --no-color contract-deployer alto mock-paymaster || true

      - name: Build app (test mode)
        run: pnpm run build:test
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Start static preview (background)
        run: |
          pnpm run preview:test &
          echo $! > /tmp/passkey-preview.pid
          echo "Waiting for http://127.0.0.1:4174 …"
          timeout 120 bash -c 'until curl -sf -o /dev/null http://127.0.0.1:4174/; do sleep 1; done'
          echo "Preview is up."

      - name: Run passkey escrow E2E (reuse preview, skip AA in Playwright globalSetup)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 45
          max_attempts: 2
          retry_wait_seconds: 15
          # Do not kill :4174 — static preview must stay up (PW_REUSE_PREVIEW=1).
          command: >-
            bash -lc
            'lsof -ti:3001,4101,4102,4103,4106 2>/dev/null | xargs kill -9 2>/dev/null || true;
            pnpm run test:e2e:passkey-escrow:reuse-preview:skip-aa'
        env:
          CI: true
          E2E_SKIP_LOCAL_AA_SETUP: '1'
          PW_REUSE_PREVIEW: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-passkey-escrow
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Upload JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-passkey-escrow
          path: test-results/junit-passkey-escrow.xml
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup (preview, docker, anvil)
        if: always()
        run: |
          if [ -f /tmp/passkey-preview.pid ]; then
            kill "$(cat /tmp/passkey-preview.pid)" 2>/dev/null || true
          fi
          docker compose -f docker-compose.aa-local.yml down -v 2>/dev/null || true
          if [ -f e2e/.anvil-passkey.pid ]; then
            pid=$(cat e2e/.anvil-passkey.pid | tr -d '[:space:]')
            if [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then
              kill "$pid" 2>/dev/null || true
            fi
            rm -f e2e/.anvil-passkey.pid
          fi
          pkill -f '[a]nvil' 2>/dev/null || true
