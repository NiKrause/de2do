<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Favicon and Icons -->
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#3B82F6" />

		<!-- SEO Meta Tags -->
		<title>De2do — Local-first peer-to-peer todos</title>
		<meta
			name="description"
			content="De2do (de2do.xyz): a local-first peer-to-peer todo app using OrbitDB, IPFS and libp2p. No login, no central servers, no tracking."
		/>
		<meta name="author" content="Nico Krause" />
		<meta
			name="keywords"
			content="de2do, peer-to-peer, local-first, libp2p, todo, orbitdb, ipfs, decentralized, p2p, web3"
		/>

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://de2do.xyz/" />
		<meta property="og:title" content="De2do — Local-first peer-to-peer todos" />
		<meta
			property="og:description"
			content="A decentralized todo app that runs in your browser with OrbitDB, IPFS, and libp2p. No login, no servers, no tracking — just P2P collaboration."
		/>
		<meta property="og:image" content="https://de2do.xyz/og-image.png" />
		<meta property="og:image:alt" content="De2do — decentralized productivity" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="De2do" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://de2do.xyz/" />
		<meta property="twitter:title" content="De2do — Local-first peer-to-peer todos" />
		<meta
			property="twitter:description"
			content="A decentralized todo app with OrbitDB, IPFS, and libp2p. No login, no servers, no tracking."
		/>
		<meta property="twitter:image" content="https://de2do.xyz/og-image.png" />
		<meta property="twitter:image:alt" content="De2do — decentralized productivity" />

		<!-- Additional Meta Tags -->
		<meta name="application-name" content="De2do" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="De2do" />
		<meta name="msapplication-TileColor" content="#3B82F6" />
		<meta name="msapplication-config" content="/browserconfig.xml" />

		<!-- Technical Meta Tags -->
		<meta name="format-detection" content="telephone=no" />
		<meta name="robots" content="index, follow" />
		<meta name="googlebot" content="index, follow" />

		<!-- Schema.org markup for Google+ -->
		<meta itemprop="name" content="De2do — Local-first peer-to-peer todos" />
		<meta
			itemprop="description"
			content="De2do (de2do.xyz): local-first peer-to-peer todos with OrbitDB, IPFS and libp2p."
		/>
		<meta itemprop="image" content="https://de2do.xyz/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
